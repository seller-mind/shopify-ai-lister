# Shopify App配置文件
name = "WISMO AI"
client_id = "c89a54bc8d3f9038baa77056f8a55b6b"

# 应用主URL
application_url = "https://shopify-ai-lister-tau.vercel.app"

# 是否为嵌入式应用
embedded = true

# 访问权限范围
[access_scopes]
scopes = "read_products,read_orders,read_fulfillments,read_themes,write_themes"

# OAuth回调URL
[auth]
redirect_urls = [
  "https://shopify-ai-lister-tau.vercel.app/auth/callback",
]

# Webhook配置
[webhooks]
api_version = "2026-04"

[webhooks.privacy_compliance]
customers_data_request = "https://shopify-ai-lister-tau.vercel.app/webhooks/customers_data_request"
customers_redact = "https://shopify-ai-lister-tau.vercel.app/webhooks/customers_redact"
shop_redact = "https://shopify-ai-lister-tau.vercel.app/webhooks/shop_redact"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/webhooks/app_uninstalled"

# POS配置
[pos]
embedded = false
