# Shopify App配置文件
# 使用 `shopify app config link` 命令关联Shopify Partner账号

name = "WISMO AI"
client_id = "c89a54bc8d3f9038baa77056f8a55b6b"

# 应用主URL（部署后需要修改为实际URL）
application_url = "https://shopify-ai-lister-tau.vercel.app"

# 是否为嵌入式应用（必须为true才能嵌入Shopify Admin）
embedded = true

# 访问权限范围
[access_scopes]
scopes = "read_products,read_orders,read_fulfillments,read_themes,write_themes"

# OAuth回调URL
[auth]
redirect_urls = [
  "https://shopify-ai-lister-tau.vercel.app/auth/callback",
]

# Webhook配置（必须包含GDPR合规Webhook）
[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]

[[webhooks.subscriptions]]
topics = ["customers/data_request"]

[[webhooks.subscriptions]]
topics = ["customers/redact"]

[[webhooks.subscriptions]]
topics = ["shop/redact"]

[[webhooks.subscriptions]]
topics = ["app_purchases_update"]

# 应用商店配置
[pos]
direct = false

# 可选：定义收费计划
